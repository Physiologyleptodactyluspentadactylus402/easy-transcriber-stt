<!DOCTYPE html>
<html lang="{{ language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcriber</title>
  <script src="/static/tailwind.cdn.min.js"></script>
  <script>
    window.APP_PORT = {{ port }};
    window.APP_LANGUAGE = "{{ language }}";
    window.APP_WIZARD_COMPLETE = {{ wizard_complete | lower }};
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .sidebar-icon { @apply w-10 h-9 rounded-lg flex items-center justify-center text-lg transition-colors; }
    .sidebar-icon.active { @apply bg-gray-800; }
    .sidebar-icon:not(.active) { @apply text-gray-500 hover:text-gray-300 hover:bg-gray-900 cursor-pointer; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans" x-data="app()" x-init="init()" x-cloak>

  <!-- First-run Wizard Modal -->
  <div x-show="showWizard" class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-gray-900 border border-gray-700 rounded-xl p-8 max-w-md w-full shadow-2xl">

      <!-- Step 1: Choose provider type -->
      <template x-if="!wizardStep || wizardStep === 'choose'">
        <div>
          <h2 class="text-xl font-bold mb-2" x-text="t('wizard_title')"></h2>
          <p class="text-gray-400 text-sm mb-6" x-text="t('wizard_setup_type')"></p>
          <div class="space-y-3">
            <button @click="wizardStep='openai_key'"
                    class="w-full text-left px-4 py-3 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm transition-colors">
              🟢 <span x-text="t('wizard_openai')"></span>
            </button>
            <button @click="wizardStep='elevenlabs_key'"
                    class="w-full text-left px-4 py-3 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm transition-colors">
              💜 <span x-text="t('wizard_elevenlabs')"></span>
            </button>
            <button @click="completeWizard('local')"
                    class="w-full text-left px-4 py-3 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm transition-colors">
              ⚡ <span x-text="t('wizard_local')"></span>
            </button>
            <button @click="completeWizard('later')"
                    class="w-full text-left px-4 py-3 text-gray-500 hover:text-gray-300 text-sm transition-colors">
              <span x-text="t('wizard_decide_later')"></span>
            </button>
          </div>
        </div>
      </template>

      <!-- Step 2: OpenAI API Key -->
      <template x-if="wizardStep === 'openai_key'">
        <div>
          <h2 class="text-xl font-bold mb-2">OpenAI API Key</h2>
          <p class="text-gray-400 text-sm mb-4" x-text="t('wizard_enter_key')"></p>
          <input type="password" x-ref="wizardOpenaiKey"
                 :placeholder="t('settings_key_placeholder')"
                 @keydown.enter="saveApiKeyAndFinishWizard('openai', $refs.wizardOpenaiKey.value)"
                 class="w-full bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-sm text-gray-300 focus:border-indigo-500 focus:outline-none mb-2">
          <p class="text-xs text-gray-600 mb-4">
            <a href="https://platform.openai.com/api-keys" target="_blank" class="text-indigo-400 hover:underline" x-text="t('wizard_get_key')"></a>
          </p>
          <div class="flex gap-3">
            <button @click="wizardStep='choose'"
                    class="px-4 py-2 text-gray-400 hover:text-white text-sm" x-text="t('wizard_back')"></button>
            <button @click="saveApiKeyAndFinishWizard('openai', $refs.wizardOpenaiKey.value)"
                    class="flex-1 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm rounded-lg font-medium"
                    x-text="t('wizard_save_and_start')"></button>
          </div>
        </div>
      </template>

      <!-- Step 2: ElevenLabs API Key -->
      <template x-if="wizardStep === 'elevenlabs_key'">
        <div>
          <h2 class="text-xl font-bold mb-2">ElevenLabs API Key</h2>
          <p class="text-gray-400 text-sm mb-4" x-text="t('wizard_enter_key')"></p>
          <input type="password" x-ref="wizardElevenlabsKey"
                 :placeholder="t('settings_key_placeholder')"
                 @keydown.enter="saveApiKeyAndFinishWizard('elevenlabs', $refs.wizardElevenlabsKey.value)"
                 class="w-full bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-sm text-gray-300 focus:border-indigo-500 focus:outline-none mb-2">
          <p class="text-xs text-gray-600 mb-4">
            <a href="https://elevenlabs.io/app/settings/api-keys" target="_blank" class="text-indigo-400 hover:underline" x-text="t('wizard_get_key')"></a>
          </p>
          <div class="flex gap-3">
            <button @click="wizardStep='choose'"
                    class="px-4 py-2 text-gray-400 hover:text-white text-sm" x-text="t('wizard_back')"></button>
            <button @click="saveApiKeyAndFinishWizard('elevenlabs', $refs.wizardElevenlabsKey.value)"
                    class="flex-1 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm rounded-lg font-medium"
                    x-text="t('wizard_save_and_start')"></button>
          </div>
        </div>
      </template>

    </div>
  </div>

  <!-- Main Layout -->
  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div class="w-14 bg-gray-1000 border-r border-gray-800 flex flex-col items-center py-4 gap-1 flex-shrink-0" style="background:#010409">
      <!-- Logo -->
      <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center text-lg mb-4">🎙</div>

      <button @click="currentSection='transcribe'"
              :class="currentSection==='transcribe' ? 'active' : ''"
              class="sidebar-icon" title="Transcribe">📂</button>
      <!-- Live mode nav icon -->
      <button @click="currentSection='live'"
              :class="currentSection==='live' ? 'bg-red-600 text-white' : 'text-gray-500 hover:text-gray-300'"
              class="w-9 h-9 rounded-lg flex items-center justify-center transition-colors"
              :title="t('nav_live')">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="6"/>
        </svg>
      </button>
      <button @click="currentSection='history'"
              :class="currentSection==='history' ? 'active' : ''"
              class="sidebar-icon" title="History">📋</button>
      <button @click="currentSection='audiolab'"
              :class="currentSection==='audiolab' ? 'active' : ''"
              class="sidebar-icon" :title="t('nav_audiolab')">🧪</button>

      <div class="flex-1"></div>

      <button @click="currentSection='settings'"
              :class="currentSection==='settings' ? 'active' : ''"
              class="sidebar-icon" title="Settings">⚙️</button>
      <button @click="saveSettings({language: settings.language==='en'?'it':'en'})"
              class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center text-xs text-gray-400 hover:text-white hover:bg-gray-700 transition-colors cursor-pointer"
              x-text="settings.language?.toUpperCase() || 'EN'"></button>
    </div>

    <!-- Main Panel -->
    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- TRANSCRIBE SECTION -->
      <div x-show="currentSection==='transcribe'" class="flex flex-col h-full">
        <!-- Header -->
        <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between flex-shrink-0">
          <div>
            <div class="font-semibold text-sm" x-text="t('nav_transcribe')"></div>
            <div class="text-xs text-gray-500" x-text="`${files.length} file(s) in queue`"></div>
          </div>
          <div class="flex gap-2 items-center flex-wrap">
            <!-- Provider selector -->
            <div class="flex flex-col gap-0.5">
              <select @change="onProviderChange($event.target.value)"
                      class="bg-gray-800 border border-gray-700 text-xs rounded-md px-2 py-1 text-gray-300">
                <template x-for="p in providers" :key="p.name">
                  <option :value="p.name" :selected="selectedProvider?.name === p.name"
                          x-text="p.available ? p.name : p.name + ' ⚠'"></option>
                </template>
              </select>
              <!-- API-key providers: link to Settings -->
              <template x-if="selectedProvider && !selectedProvider.available && isApiKeyProvider(selectedProvider.name)">
                <button @click="currentSection='settings'"
                        class="text-xs text-yellow-400 hover:text-yellow-300 underline mt-1"
                        x-text="t('provider_needs_key')">
                </button>
              </template>
              <!-- Installable providers: open install modal -->
              <template x-if="selectedProvider && !selectedProvider.available && !isApiKeyProvider(selectedProvider.name)">
                <button @click="openInstallModal(selectedProvider)"
                        class="text-xs text-indigo-400 hover:text-indigo-300 underline mt-1"
                        x-text="t('install_not_installed')">
                </button>
              </template>
            </div>
            <!-- Model selector -->
            <div class="flex flex-col gap-0.5">
              <select @change="onModelChange($event.target.value)"
                      class="bg-gray-800 border border-gray-700 text-xs rounded-md px-2 py-1 text-gray-300">
                <template x-for="m in (selectedProvider?.models || [])" :key="m.id">
                  <option :value="m.id" :selected="selectedModel?.id === m.id" x-text="m.name"></option>
                </template>
              </select>
              <template x-if="selectedModel && selectedModel.hardware_hint">
                <span class="text-xs px-1.5 py-0.5 rounded"
                      :class="{
                        'bg-indigo-900 text-indigo-300': selectedModel.hardware_hint === 'cloud',
                        'bg-green-900 text-green-300': selectedModel.hardware_hint === 'cpu' || selectedModel.hardware_hint === 'cpu_recommended',
                        'bg-yellow-900 text-yellow-300': selectedModel.hardware_hint === 'gpu_optional' || selectedModel.hardware_hint === 'gpu_recommended',
                      }"
                      x-text="t('provider_hardware_' + selectedModel.hardware_hint)">
                </span>
              </template>
            </div>
          </div>
        </div>

        <!-- Drop zone -->
        <div class="mx-4 mt-3 border-2 border-dashed border-gray-700 rounded-xl p-6 text-center flex-shrink-0
                    hover:border-indigo-500 transition-colors cursor-pointer"
             @dragover.prevent
             @drop="handleDrop($event)"
             @click="$refs.fileInput.click()">
          <div class="text-2xl mb-1">📁</div>
          <div class="text-sm text-gray-400">
            <span x-text="t('transcribe_drop_prompt')"></span>
            <span class="text-indigo-400 underline cursor-pointer" x-text="t('transcribe_drop_browse')"></span>
          </div>
          <div class="text-xs text-gray-600 mt-1" x-text="t('transcribe_drop_formats')"></div>
          <input type="file" class="hidden" x-ref="fileInput"
                 accept=".mp3,.m4a,.mp4,.wav,.ogg,.flac,.webm,.aac,.wma,.opus,.mpeg,.mpga" multiple
                 @change="handleFileInput($event)">
        </div>

        <!-- Output format toggles -->
        <div class="mx-4 mt-2 flex gap-2 flex-wrap flex-shrink-0">
          <template x-for="fmt in ['txt','srt','vtt','md']" :key="fmt">
            <button @click="toggleFormat(fmt)"
                    :class="outputFormats.includes(fmt)
                      ? 'bg-indigo-600 text-white'
                      : 'bg-gray-800 text-gray-400 hover:text-gray-200'"
                    class="px-3 py-1 rounded-md text-xs font-mono transition-colors"
                    x-text="fmt.toUpperCase()"></button>
          </template>
          <!-- Speaker labels (if supported) -->
          <button x-show="selectedModel?.supports_speaker_labels"
                  @click="speakerLabels = !speakerLabels"
                  :class="speakerLabels ? 'bg-purple-700 text-white' : 'bg-gray-800 text-gray-400'"
                  class="px-3 py-1 rounded-md text-xs transition-colors">
            👥 Speakers
          </button>
        </div>

        <!-- Prompt input (ElevenLabs Scribe v2 only) -->
        <div x-show="selectedModel?.id === 'scribe_v2'" class="mx-4 mt-2 flex-shrink-0">
          <input x-model="prompt" type="text"
                 placeholder="Keyterms (comma-separated, e.g. ATP, mitosis)"
                 class="w-full bg-gray-800 border border-gray-700 rounded-md px-3 py-1.5 text-xs text-gray-300 placeholder-gray-600">
        </div>

        <!-- Queue list -->
        <div class="flex-1 overflow-y-auto px-4 mt-3 space-y-2">
          <template x-for="(item, idx) in files" :key="item.name + idx">
            <div class="bg-gray-900 border rounded-lg px-3 py-2"
                 :class="item.status==='error' ? 'border-red-800' : 'border-gray-800'">
              <div class="flex items-center justify-between mb-1">
                <div class="text-sm font-medium truncate max-w-xs" x-text="item.name"></div>
                <div class="flex items-center gap-2">
                  <span class="text-xs"
                        :class="{
                          'text-indigo-400': item.status==='running',
                          'text-green-400': item.status==='done',
                          'text-red-400': item.status==='error',
                          'text-gray-500': item.status==='pending'
                        }"
                        x-text="item.status==='running' ? Math.round(item.progress)+'%' : item.status"></span>
                  <button x-show="item.status==='pending'" @click="removeFile(idx)"
                          class="text-gray-600 hover:text-red-400 text-xs">✕</button>
                </div>
              </div>
              <div x-show="item.status==='running'" class="bg-gray-800 rounded h-1">
                <div class="bg-indigo-500 h-1 rounded transition-all"
                     :style="`width: ${item.progress}%`"></div>
              </div>
              <div x-show="item.status==='running' && item.progressMessage"
                   class="text-xs text-gray-500 mt-0.5" x-text="item.progressMessage"></div>
              <div x-show="item.status==='error'" class="text-xs text-red-400 mt-1" x-text="item.error"></div>
              <div x-show="item.status==='done'" class="mt-1 flex gap-2 flex-wrap">
                <template x-for="path in item.outputFiles" :key="path">
                  <a :href="`/api/download?path=${encodeURIComponent(path)}`"
                     class="text-xs text-indigo-400 hover:underline"
                     x-text="path.split(/[\\/]/).pop()"></a>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- Bottom action bar -->
        <div class="px-4 py-3 border-t border-gray-800 flex items-center gap-3 flex-shrink-0">
          <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer flex-1">
            <div @click="mergeOutput = !mergeOutput"
                 :class="mergeOutput ? 'bg-indigo-600' : 'bg-gray-700'"
                 class="w-8 h-4 rounded-full relative transition-colors cursor-pointer">
              <div :class="mergeOutput ? 'translate-x-4' : 'translate-x-0.5'"
                   class="absolute top-0.5 w-3 h-3 bg-white rounded-full transition-transform"></div>
            </div>
            <span x-text="t('transcribe_merge')"></span>
          </label>
          <button x-show="isRunning" @click="stopQueue()"
                  class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded-lg text-xs transition-colors">
            ⏹ <span x-text="t('transcribe_stop')"></span>
          </button>
          <button @click="startQueue()" :disabled="!files.length || isRunning"
                  class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40
                         disabled:cursor-not-allowed rounded-lg text-xs font-semibold transition-colors">
            ▶ <span x-text="t('transcribe_start')"></span>
          </button>
        </div>
      </div>

      <!-- ── Live Mode ─────────────────────────────────── -->
      <div x-show="currentSection === 'live'" x-cloak class="flex flex-col h-full gap-4 px-4 py-4 overflow-y-auto">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wide"
            x-text="t('live_section_title')"></h2>

        <!-- ffmpeg warning -->
        <template x-if="!ffmpegAvailable">
          <div class="bg-yellow-900/40 border border-yellow-700 rounded-lg p-3 text-sm text-yellow-300">
            <span x-text="t('live_ffmpeg_missing')"></span>
            <span class="block text-xs text-yellow-500 mt-1" x-text="t('live_ffmpeg_install_hint')"></span>
          </div>
        </template>

        <!-- No providers warning -->
        <template x-if="ffmpegAvailable && liveProviders.length === 0">
          <div class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm text-gray-400"
               x-text="t('live_no_providers')"></div>
        </template>

        <template x-if="ffmpegAvailable && liveProviders.length > 0">
          <div class="flex flex-col gap-4">

            <!-- Provider + model row -->
            <div class="grid grid-cols-2 gap-2" x-show="!liveRecording">
              <div>
                <label class="text-xs text-gray-500 uppercase tracking-wide block mb-1">Provider</label>
                <select class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200"
                        @change="liveProvider = liveProviders.find(p => p.name === $event.target.value); liveModel = liveProvider?.models.find(m => m.supports_live)">
                  <template x-for="p in liveProviders" :key="p.name">
                    <option :value="p.name" x-text="p.name.replace('_','-')"></option>
                  </template>
                </select>
              </div>
              <div>
                <label class="text-xs text-gray-500 uppercase tracking-wide block mb-1">Model</label>
                <select class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200"
                        @change="liveModel = liveProvider?.models.find(m => m.id === $event.target.value)">
                  <template x-for="m in (liveProvider?.models.filter(m => m.supports_live) || [])" :key="m.id">
                    <option :value="m.id" x-text="m.name"></option>
                  </template>
                </select>
              </div>
            </div>

            <!-- Waveform canvas -->
            <canvas id="live-waveform"
                    width="400" height="60"
                    class="w-full rounded-lg bg-gray-900"
                    x-show="liveRecording"></canvas>

            <!-- Timer + recording indicator -->
            <div x-show="liveRecording" class="flex items-center gap-3">
              <span class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></span>
              <span class="text-sm font-mono text-gray-200" x-text="_formatLiveTime(liveTimer)"></span>
              <span class="text-xs text-gray-500" x-text="t('live_recording')"></span>
            </div>

            <!-- Transcript area -->
            <div id="live-transcript"
                 class="flex-1 min-h-32 max-h-64 overflow-y-auto bg-gray-900 border border-gray-800 rounded-lg p-3 text-sm text-gray-300 space-y-1.5">
              <template x-if="liveTranscript.length === 0">
                <p class="text-gray-600 italic" x-text="t('live_transcript_placeholder')"></p>
              </template>
              <template x-for="(seg, i) in liveTranscript" :key="i">
                <p :class="i === liveTranscript.length - 1 ? 'text-white' : 'text-gray-400'"
                   x-text="seg.text"></p>
              </template>
            </div>

            <!-- Save audio toggle -->
            <label x-show="!liveRecording" class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer select-none">
              <input type="checkbox" x-model="liveSaveAudio"
                     class="w-4 h-4 rounded border-gray-600 bg-gray-800 text-indigo-500 focus:ring-indigo-500">
              <span x-text="t('live_save_audio_label')"></span>
            </label>

            <!-- Controls -->
            <div class="flex gap-3">
              <template x-if="!liveRecording">
                <button @click="startRecording()"
                        class="flex-1 bg-red-600 hover:bg-red-500 text-white text-sm font-medium py-2.5 rounded-lg"
                        x-text="t('live_start')"></button>
              </template>
              <template x-if="liveRecording">
                <div class="contents">
                  <button @click="pauseRecording()"
                          class="px-4 py-2.5 bg-gray-700 hover:bg-gray-600 text-white text-sm rounded-lg"
                          x-text="livePaused ? t('live_resume') : t('live_pause')"></button>
                  <button @click="stopRecording()"
                          class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2.5 rounded-lg"
                          x-text="t('live_stop')"></button>
                </div>
              </template>
            </div>

          </div>
        </template>
      </div>

      <!-- HISTORY SECTION -->
      <div x-show="currentSection==='history'" class="flex flex-col h-full">
        <div class="px-4 py-3 border-b border-gray-800 flex-shrink-0">
          <div class="font-semibold text-sm" x-text="t('history_title')"></div>
        </div>
        <div class="flex-1 overflow-y-auto px-4 py-3 space-y-2">
          <p x-show="!historyItems.length" class="text-gray-600 text-sm text-center py-8"
             x-text="t('history_empty')"></p>
          <template x-for="item in historyItems" :key="item.id">
            <div class="bg-gray-900 border border-gray-800 rounded-lg px-4 py-3">
              <div class="flex items-start justify-between gap-2">
                <div class="min-w-0">
                  <div class="text-sm font-medium truncate"
                       x-text="item.input_filenames.join(', ')"></div>
                  <div class="text-xs text-gray-500 mt-0.5"
                       x-text="`${item.provider_name} · ${item.model_id} · ${new Date(item.created_at*1000).toLocaleString()}`"></div>
                  <div class="mt-1.5 flex gap-2 flex-wrap">
                    <template x-for="path in item.output_paths" :key="path">
                      <a :href="`/api/download?path=${encodeURIComponent(path)}`"
                         class="text-xs text-indigo-400 hover:underline"
                         x-text="path.split(/[\\/]/).pop()"></a>
                    </template>
                  </div>
                </div>
                <button @click="deleteHistory(item.id)"
                        class="text-gray-600 hover:text-red-400 text-sm flex-shrink-0">🗑</button>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- SETTINGS SECTION -->
      <div x-show="currentSection==='settings'" class="flex flex-col h-full">
        <div class="px-4 py-3 border-b border-gray-800 flex-shrink-0">
          <div class="font-semibold text-sm" x-text="t('settings_title')"></div>
        </div>
        <div class="flex-1 overflow-y-auto px-4 py-4 space-y-6">

          <!-- API Keys -->
          <div>
            <div class="text-xs uppercase text-gray-500 font-semibold mb-3"
                 x-text="t('settings_api_keys')"></div>
            <div class="space-y-4">

              <!-- OpenAI API Key -->
              <div>
                <label class="text-xs text-gray-400" x-text="t('settings_openai_key')"></label>
                <div class="flex gap-2 mt-1">
                  <input type="password" :placeholder="settings.openai_key_set ? 'sk-••••••••••••••••(set)' : t('settings_key_placeholder')"
                         x-ref="openaiKeyInput"
                         class="flex-1 bg-gray-800 border border-gray-700 rounded-md px-3 py-1.5 text-sm text-gray-300 focus:border-indigo-500 focus:outline-none">
                  <button @click="saveApiKey('openai', $refs.openaiKeyInput.value); $refs.openaiKeyInput.value=''"
                          class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs rounded-md font-medium"
                          x-text="t('settings_save_key')"></button>
                </div>
                <div class="mt-1 text-xs"
                     :class="settings.openai_key_set ? 'text-green-500' : 'text-gray-600'"
                     x-text="settings.openai_key_set ? '✓ ' + t('settings_key_active') : t('settings_key_not_set')"></div>
              </div>

              <!-- ElevenLabs API Key -->
              <div>
                <label class="text-xs text-gray-400" x-text="t('settings_elevenlabs_key')"></label>
                <div class="flex gap-2 mt-1">
                  <input type="password" :placeholder="settings.elevenlabs_key_set ? '••••••••••••••••(set)' : t('settings_key_placeholder')"
                         x-ref="elevenlabsKeyInput"
                         class="flex-1 bg-gray-800 border border-gray-700 rounded-md px-3 py-1.5 text-sm text-gray-300 focus:border-indigo-500 focus:outline-none">
                  <button @click="saveApiKey('elevenlabs', $refs.elevenlabsKeyInput.value); $refs.elevenlabsKeyInput.value=''"
                          class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs rounded-md font-medium"
                          x-text="t('settings_save_key')"></button>
                </div>
                <div class="mt-1 text-xs"
                     :class="settings.elevenlabs_key_set ? 'text-green-500' : 'text-gray-600'"
                     x-text="settings.elevenlabs_key_set ? '✓ ' + t('settings_key_active') : t('settings_key_not_set')"></div>
              </div>

              <p class="text-xs text-gray-600" x-text="t('settings_keys_stored_in_env')"></p>
            </div>
          </div>

          <!-- Language -->
          <div>
            <label class="text-xs text-gray-400" x-text="t('settings_language')"></label>
            <select @change="saveSettings({language: $event.target.value})"
                    class="mt-1 block bg-gray-800 border border-gray-700 rounded-md px-3 py-1.5 text-sm text-gray-300">
              <option value="en" :selected="settings.language==='en'">English</option>
              <option value="it" :selected="settings.language==='it'">Italiano</option>
            </select>
          </div>

          <!-- Chunk size -->
          <div>
            <label class="text-xs text-gray-400" x-text="t('settings_chunk_size')"></label>
            <input type="number" :value="settings.chunk_size_sec" min="30" max="1800"
                   @change="saveSettings({chunk_size_sec: parseInt($event.target.value)})"
                   class="mt-1 block w-32 bg-gray-800 border border-gray-700 rounded-md px-3 py-1.5 text-sm text-gray-300">
          </div>

          <!-- Re-run wizard -->
          <div class="pt-2 border-t border-gray-800">
            <button @click="showWizard = true"
                    class="text-xs text-indigo-400 hover:underline">
              Run setup wizard again
            </button>
          </div>

        </div>
      </div>

      <!-- AUDIO LAB SECTION -->
      <div x-show="currentSection==='audiolab'" x-cloak class="flex flex-col h-full">
        <!-- Header -->
        <div class="px-4 py-3 border-b border-gray-800 flex-shrink-0">
          <div class="font-semibold text-sm" x-text="t('nav_audiolab')"></div>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4">

          <!-- Drop zone -->
          <div class="border-2 border-dashed border-gray-700 rounded-xl p-6 text-center
                      hover:border-indigo-500 transition-colors cursor-pointer"
               @dragover.prevent
               @drop.prevent="alHandleFile($event)"
               @click="$refs.alFileInput.click()">
            <div class="text-2xl mb-1">🎵</div>
            <div class="text-sm text-gray-400" x-show="!alFile">
              <span x-text="t('audiolab_drop_prompt')"></span>
              <span class="text-indigo-400 underline cursor-pointer" x-text="t('audiolab_drop_browse')"></span>
            </div>
            <div class="text-sm text-white" x-show="alFile" x-text="alFile?.name"></div>
            <input type="file" class="hidden" x-ref="alFileInput"
                   accept=".mp3,.m4a,.mp4,.wav,.ogg,.flac,.webm,.aac,.wma,.opus"
                   @change="alHandleFile($event)">
          </div>

          <!-- Presets -->
          <div class="flex gap-2">
            <button @click="alSetPreset('lecture')"
                    :class="alPreset==='lecture' ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400 hover:text-gray-200'"
                    class="flex-1 px-3 py-2 rounded-lg text-sm transition-colors">
              🎓 <span x-text="t('audiolab_preset_lecture')"></span>
            </button>
            <button @click="alSetPreset('clean')"
                    :class="alPreset==='clean' ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400 hover:text-gray-200'"
                    class="flex-1 px-3 py-2 rounded-lg text-sm transition-colors">
              🎙️ <span x-text="t('audiolab_preset_clean')"></span>
            </button>
            <button @click="alSetPreset('custom')"
                    :class="alPreset==='custom' ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400 hover:text-gray-200'"
                    class="flex-1 px-3 py-2 rounded-lg text-sm transition-colors">
              🔧 <span x-text="t('audiolab_preset_custom')"></span>
            </button>
          </div>

          <!-- Toggles -->
          <div class="space-y-3 bg-gray-900 border border-gray-800 rounded-lg p-4">
            <!-- Loudnorm -->
            <div class="flex items-center justify-between">
              <label class="text-sm text-gray-300 flex items-center gap-2">
                <input type="checkbox" x-model="alLoudnorm" :disabled="alPreset!=='custom'"
                       class="w-4 h-4 rounded border-gray-600 bg-gray-800 text-indigo-500">
                <span x-text="t('audiolab_loudnorm')"></span>
              </label>
              <div class="flex items-center gap-2" x-show="alLoudnorm">
                <input type="range" min="-24" max="-10" step="1" x-model.number="alLoudnormTarget"
                       :disabled="alPreset!=='custom'"
                       class="w-24 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                <span class="text-xs text-gray-500 w-12 text-right" x-text="alLoudnormTarget + ' LUFS'"></span>
              </div>
            </div>
            <!-- Voice Isolation -->
            <label class="flex items-center gap-2 text-sm text-gray-300">
              <input type="checkbox" x-model="alVoiceIsolation" :disabled="alPreset!=='custom'"
                     class="w-4 h-4 rounded border-gray-600 bg-gray-800 text-indigo-500">
              <span x-text="t('audiolab_voice_isolation')"></span>
            </label>
            <!-- Denoise -->
            <label class="flex items-center gap-2 text-sm text-gray-300">
              <input type="checkbox" x-model="alDenoise" :disabled="alPreset!=='custom'"
                     class="w-4 h-4 rounded border-gray-600 bg-gray-800 text-indigo-500">
              <span x-text="t('audiolab_denoise')"></span>
            </label>
          </div>

          <!-- Process / Cancel + Progress -->
          <div class="flex items-center gap-3">
            <button @click="alProcess()" :disabled="!alCanProcess() || alStatus==='processing'"
                    x-show="alStatus !== 'processing'"
                    class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm rounded-lg font-medium transition-colors">
              ▶ <span x-text="t('audiolab_process')"></span>
            </button>
            <button @click="alCancel()" x-show="alStatus==='processing'"
                    class="px-4 py-2 bg-red-600 hover:bg-red-500 text-white text-sm rounded-lg font-medium transition-colors">
              ✕ <span x-text="t('audiolab_cancel')"></span>
            </button>
            <div x-show="alStatus==='processing'" class="flex-1">
              <div class="bg-gray-800 rounded-full h-2 mb-1">
                <div class="bg-indigo-500 h-2 rounded-full transition-all duration-300"
                     :style="`width: ${Math.round(alProgress * 100)}%`"></div>
              </div>
              <p class="text-xs text-gray-500" x-text="alMessage"></p>
            </div>
          </div>

          <!-- A/B Player (shown when done) -->
          <template x-if="alStatus==='done'">
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3">
              <!-- Hidden audio elements -->
              <audio x-ref="alAudioA" :src="alOriginalUrl" preload="metadata"
                     @timeupdate="alCurrentTime = $refs.alAudioA.currentTime"
                     @loadedmetadata="alDuration = $refs.alAudioA.duration"
                     @ended="alPlaying = false"></audio>
              <audio x-ref="alAudioB" :src="alProcessedUrl" preload="metadata" muted></audio>

              <!-- Play + seekbar -->
              <div class="flex items-center gap-3">
                <button @click="alPlay()" class="text-white text-lg w-8 h-8 flex items-center justify-center">
                  <span x-text="alPlaying ? '⏸' : '▶'"></span>
                </button>
                <div class="flex-1 bg-gray-800 rounded-full h-2 cursor-pointer" @click="alSeek($event)">
                  <div class="bg-indigo-500 h-2 rounded-full transition-all"
                       :style="`width: ${alDuration ? (alCurrentTime / alDuration * 100) : 0}%`"></div>
                </div>
                <span class="text-xs text-gray-500 w-24 text-right"
                      x-text="`${_formatLiveTime(Math.floor(alCurrentTime))} / ${_formatLiveTime(Math.floor(alDuration))}`"></span>
              </div>

              <!-- A/B toggle -->
              <div class="flex items-center gap-2">
                <button @click="alPlayerSource='A'; _alSyncPlayer()"
                        :class="alPlayerSource==='A' ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400'"
                        class="px-3 py-1.5 rounded-md text-xs font-medium transition-colors"
                        x-text="t('audiolab_player_original')"></button>
                <button @click="alPlayerSource='B'; _alSyncPlayer()"
                        :class="alPlayerSource==='B' ? 'bg-green-600 text-white' : 'bg-gray-800 text-gray-400'"
                        class="px-3 py-1.5 rounded-md text-xs font-medium transition-colors"
                        x-text="t('audiolab_player_processed')"></button>
                <div class="flex-1"></div>
                <!-- Volume -->
                <span class="text-xs text-gray-500">🔊</span>
                <input type="range" min="0" max="1" step="0.05" :value="alVolume"
                       @input="alSetVolume(parseFloat($event.target.value))"
                       class="w-20 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
              </div>

              <!-- Stats -->
              <div x-show="alStats" class="flex gap-4 text-xs text-gray-500 border-t border-gray-800 pt-2">
                <span x-text="`${alStats?.original_lufs?.toFixed(1)} → ${alStats?.processed_lufs?.toFixed(1)} ${t('audiolab_stats_lufs')}`"></span>
                <span x-text="`${_formatLiveTime(Math.floor(alStats?.duration_sec || 0))} ${t('audiolab_stats_duration').toLowerCase()}`"></span>
                <span x-text="`${formatBytes(alStats?.processed_size || 0)}`"></span>
              </div>

              <!-- Download + Transcribe -->
              <div class="flex gap-3 border-t border-gray-800 pt-3">
                <a :href="`/api/audiolab/download/${alJobId}`"
                   class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white text-sm rounded-lg transition-colors">
                  📥 <span x-text="t('audiolab_download')"></span>
                </a>
                <button @click="alSendToTranscribe()"
                        class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm rounded-lg font-medium transition-colors">
                  → <span x-text="t('audiolab_send_transcribe')"></span>
                </button>
              </div>
            </div>
          </template>

          <!-- Error state -->
          <div x-show="alStatus==='error'" class="bg-red-900/30 border border-red-800 rounded-lg p-3 text-sm text-red-300" x-text="alMessage"></div>

        </div>
      </div>

    </div><!-- end main panel -->
  </div><!-- end layout -->

  <!-- Install Modal -->
  <div x-show="installModal !== null"
       x-cloak
       class="fixed inset-0 bg-black/60 flex items-center justify-center z-50"
       @keydown.escape.window="closeInstallModal()">
    <div class="bg-gray-900 border border-gray-700 rounded-xl p-6 w-full max-w-md mx-4 shadow-2xl">
      <h2 class="text-lg font-semibold text-white mb-2"
          x-text="t('install_modal_title').replace('{provider}', installModal?.providerLabel)"></h2>
      <p class="text-gray-400 text-sm mb-4" x-text="t('install_prompt')"></p>

      <template x-if="installModal?.packages">
        <div class="bg-gray-800 rounded-lg px-4 py-3 mb-4 text-sm text-gray-300">
          <span class="text-gray-500 text-xs uppercase tracking-wide" x-text="t('install_disk')"></span>
          <div x-text="installModal.packages" class="mt-1 font-mono text-indigo-300"></div>
        </div>
      </template>

      <!-- Progress bar (shown while installing) -->
      <template x-if="installing">
        <div class="mb-4">
          <div class="w-full bg-gray-800 rounded-full h-2 mb-2">
            <div class="bg-indigo-500 h-2 rounded-full transition-all duration-300"
                 :style="`width: ${Math.round(installProgress * 100)}%`"></div>
          </div>
          <p class="text-xs text-gray-400" x-text="installMessage || t('install_in_progress')"></p>
        </div>
      </template>

      <!-- Error -->
      <template x-if="installError">
        <p class="text-red-400 text-sm mb-4" x-text="installError"></p>
      </template>

      <div class="flex gap-3 justify-end">
        <button @click="closeInstallModal()"
                :disabled="installing"
                class="px-4 py-2 text-sm text-gray-400 hover:text-white disabled:opacity-40"
                x-text="t('install_cancel')"></button>
        <button @click="confirmInstall()"
                :disabled="installing"
                class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white text-sm rounded-lg font-medium"
                x-text="installing ? t('install_in_progress') : t('install_confirm')"></button>
      </div>
    </div>
  </div>

  <script src="/static/app.js" defer></script>
  <script src="/static/alpine.min.js" defer></script>
</body>
</html>
